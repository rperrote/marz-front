name: React Doctor

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  score:
    name: Report score
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run React Doctor
        id: doctor
        continue-on-error: true
        run: |
          set +e
          pnpm react-doctor > react-doctor-report.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Build score report
        id: report
        continue-on-error: true
        run: |
          set +e
          pnpm react-doctor:report react-doctor-report.txt --min-score 95 --output-json react-doctor-score.json --output-markdown react-doctor-comment.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat react-doctor-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment score on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')

            if (!fs.existsSync('react-doctor-comment.md')) {
              core.warning('react-doctor-comment.md not found, skipping comment')
              return
            }

            const marker = '<!-- marz-react-doctor-score -->'
            const body = fs.readFileSync('react-doctor-comment.md', 'utf8')
            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const previousComment = comments.data.find((comment) =>
              comment.body?.includes(marker),
            )

            if (previousComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previousComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
